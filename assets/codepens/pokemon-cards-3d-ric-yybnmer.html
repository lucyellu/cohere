  <style>
  /* 

  Card shine effects have been extracted from the Simon Goellner Pokemon Cards Holo effect v2 and later simplified a bit. 

  Checkout the original code here: https://codepen.io/simeydotme/pen/abYWJdX 

  */
  :root {
    --pos: 50% 50%;
    --posx: 50%;
    --posy: 50%;
    --hyp: 0;
    --gradient-size: 150px;
  }

  *,
  *::after,
  *::before {
    padding: 0;
    margin: 0;

    box-sizing: border-box;

    /* Debug */
    /* outline: 2px solid lime; */
  }

  @layer base, cards;

  /* Misc styles */
  @layer base {
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;

      display: grid;
      place-items: center;
      min-block-size: 100dvh;

      color: var(--white);
      background: hsl(224, 32%, 12%);
      background-image: conic-gradient(
        from 0deg at 50% 50%,
        lightblue,
        lightpurple,
        lightpurple,
        lightblue
      );
      background-blend-mode: multiply;

      overflow: hidden;
      position: relative;
    }

    body::before {
      --size: 30px;
      --line: rgba(255 255 255 / 0.2);
      content: "";
      height: 100vh;
      width: 100vh;
      position: fixed;
      background: linear-gradient(
            90deg,
            var(--line) 1px,
            transparent 1px var(--size)
          )
          50% 50% / var(--size) var(--size),
        linear-gradient(var(--line) 1px, transparent 1px var(--size)) 50% 50% /
          var(--size) var(--size);
      background-position: 0% 70%;
      mask: radial-gradient(ellipse at center, white, transparent 70%);
      transform: rotate(45deg) scale(2);
      pointer-events: none;
      top: 0;
      transform-style: flat;
    }

    main {
      display: flex;
      gap: 80px;
    }

    .ric-link {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
    }

    a svg {
      width: 60px;
      heigth: auto;

      transition: transform 0.2s, filter 0.2s;
    }

    a svg:hover {
      transform: scale(1.2) rotate(-10deg);
      filter: drop-shadow(rgba(255 255 255 / 0.2) 0 2px 10px);
    }
  }

  @layer cards {
    .card {
      /* we need the parent element to preserve the 3D style always */
      transform-style: preserve-3d;
      backface-visibility: hidden;

      display: flex;
      border: none;
      box-shadow: 0 4px 10px black;
      border-radius: 1rem;

      transition: transform 150ms linear;
      position: relative;
    }

    .card-wrapper {
      display: flex;
    }

    .card::after,
    .card::before {
      content: "";
      position: absolute;
      border-radius: 1.2rem;
    }

    .card::after {
      z-index: -1;
      inset: 0;
      background: radial-gradient(
        circle at var(--mouse-x) var(--mouse-y),
        var(--blur-color, hsl(52, 66%, 77%, var(--active-blur, 1))),
        transparent var(--gradient-size)
      );

      filter: blur(1rem);
    }

    /* Border color effects based on card rarity */
    .card[data-rarity="rare rainbow"] {
      --blur-color: hsl(52, 66%, 77%, var(--active-blur, 1));
      --border-color-in: hsl(52, 66%, 77%);
      --border-color-out: hsl(183, 41%, 75%);
    }

    .card[data-rarity="rare holo v"] {
      --blur-color: hsl(48, 100%, 69%, var(--active-blur, 1));
      --border-color-in: hsl(48, 100%, 69%);
      --border-color-out: hsl(240, 100%, 69%);
    }

    .card[data-rarity="rare holo v"]::before,
    .card[data-rarity="rare rainbow"]::before {
      z-index: -1;
      inset: -0.2rem;
      background: radial-gradient(
        circle at var(--mouse-x) var(--mouse-y),
        var(--border-color-in),
        var(--border-color-out),
        transparent var(--gradient-size)
      );
    }

    img {
      width: 300px;
      height: auto;
      border-radius: 1rem;
    }

    .card__shine,
    .card__glare {
      position: absolute;
      inset: 0;
    }

    .card__glare {
      background-image: radial-gradient(
        farthest-corner circle at var(--mouse-x) var(--mouse-y),
        hsla(
            0,
            0%,
            100%,
            calc(var(--gradient-opacity) * 0.8 * var(--active-glare, 1))
          )
          10%,
        hsla(
            0,
            0%,
            100%,
            calc(var(--gradient-opacity) * 0.65 * var(--active-glare, 1))
          )
          20%,
        hsla(
            0,
            0%,
            0%,
            calc(var(--gradient-opacity) * 0.65 * var(--active-glare, 1))
          )
          90%
      );
      border-radius: 1.2rem;
      mix-blend-mode: overlay;
    }

    .card__shine {
      transform: translateZ(1px);
      display: grid;
      opacity: var(--gradient-opacity);
      background: transparent;
      background-size: cover;
      background-position: center;
      mix-blend-mode: color-dodge;
      filter: brightness(0.85) contrast(2.75) saturate(0.65);
    }

    /* Rare Holo V effect */
    .card[data-rarity="rare holo v"] .card__shine,
    .card[data-rarity="rare holo v"] .card__shine::after {
      /* grainy texture for the holo v card */
      --grain: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjUwMCI+CjxmaWx0ZXIgaWQ9Im4iPgo8ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjEwIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIj48L2ZlVHVyYnVsZW5jZT4KPC9maWx0ZXI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iNTAwIiBmaWxsPSIjMDAwIj48L3JlY3Q+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iNTAwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuMyI+PC9yZWN0Pgo8L3N2Zz4=");
      --space: 5%;

      background-image: var(--grain),
        repeating-linear-gradient(
          0deg,
          rgb(255, 119, 115) calc(var(--space) * 1),
          rgba(255, 237, 95, 1) calc(var(--space) * 2),
          rgba(168, 255, 95, 1) calc(var(--space) * 3),
          rgba(131, 255, 247, 1) calc(var(--space) * 4),
          rgba(120, 148, 255, 1) calc(var(--space) * 5),
          rgb(216, 117, 255) calc(var(--space) * 6),
          rgb(255, 119, 115) calc(var(--space) * 7)
        ),
        repeating-linear-gradient(
          var(--angle),
          #0e152e 0%,
          hsl(180, 10%, 60%) 3.8%,
          hsl(180, 29%, 66%) 4.5%,
          hsl(180, 10%, 60%) 5.2%,
          #0e152e 10%,
          #0e152e 12%
        ),
        radial-gradient(
          farthest-corner circle at var(--mouse-x) var(--mouse-y),
          rgba(0, 0, 0, 0.1) 12%,
          rgba(0, 0, 0, 0.15) 20%,
          rgba(0, 0, 0, 0.25) 120%
        );
      background-blend-mode: screen, hue, hard-light;
      background-size: var(--imgsize), 200% 700%, 300%, 200%;
      background-position: center, 0% var(--posy), var(--posx) var(--posy),
        var(--posx) var(--posy);

      filter: brightness(0.8) contrast(2.95) saturate(0.5);
      border-radius: 1rem;
    }

    .card[data-rarity="rare holo v"] .card__shine::after {
      content: "";
      background-position: center, 0% var(--mouse-x),
        calc(var(--mouse-y) * -0.25) calc(var(--mouse-x) * -0.25),
        var(--mouse-y) var(--mouse-x);
      background-size: var(--imgsize), 200% 400%, 195%, 200%;
      filter: brightness(1) contrast(2.5) saturate(2.75);
      mix-blend-mode: soft-light;
    }

    /* Rare rainbow effect */
    .card[data-rarity="rare rainbow"] .card__shine,
    .card[data-rarity="rare rainbow"] .card__shine:after {
      --space: 7%;
      --angle: -20deg;
      --angle2: 130deg;
      --imgsize: 540px 700px;

      border-radius: 1rem;

      background-image: url("https://res.cloudinary.com/simey/image/upload/Dev/PokemonCards/rainbow2.jpg"),
        repeating-linear-gradient(
          var(--angle),
          rgb(253, 71, 65) calc(var(--space) * 1),
          rgb(255, 243, 151) calc(var(--space) * 2),
          rgba(168, 255, 95, 1) calc(var(--space) * 3),
          rgba(131, 255, 247, 1) calc(var(--space) * 4),
          rgb(75, 198, 255) calc(var(--space) * 5),
          rgb(255, 73, 246) calc(var(--space) * 6),
          rgb(255, 56, 49) calc(var(--space) * 7)
        ),
        repeating-linear-gradient(
          var(--angle2),
          rgba(89, 46, 80, 0.5) 0%,
          hsl(118, 43%, 76%) 2.5%,
          rgb(223, 96, 202) 5%,
          hsl(180, 57%, 56%) 7.5%,
          rgba(14, 21, 46, 0.5) 10%,
          rgba(14, 21, 46, 0.5) 15%
        ),
        url("https://res.cloudinary.com/simey/image/upload/Dev/PokemonCards/illusion2.webp");
      background-size: 50% 50%, 500% 500%, 1000% 1000%, var(--imgsize);
      background-position: center, 0% calc(var(--mouse-x) * 0.5),
        var(--posx) var(--posy), center;
      background-blend-mode: color-burn, soft-light, normal;
      filter: brightness(calc((var(--hyp) * 0.25) + 0.66)) contrast(2)
        saturate(0.95);
    }

    .card[data-rarity="rare rainbow"] .card__shine:after {
      content: "";
      border-radius: 1rem;
      background-position: center, 0% calc(var(--posy) * -1),
        calc(var(--posx) * -1) calc(var(--posy) * -1), center;
      mix-blend-mode: exclusion;
    }
  }

<script type="module">
import { Pane } from "https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js";

// ----------- VARIABLES ----------------
/* The higher, the less card rotation */
let rotationFactor = 20;
/* Indicates whether the card goes back or forward when mouse is hovering */
let invertRotation = false;

// --------- CONFIG PANE LOGIC ----------------

const pane = new Pane();

const PARAMS = {
  disableBlur: false,
  disableGlare: false,
  rotationFactor,
  invertRotation: false
};

const config = pane.addFolder({
  title: "Config",
  expanded: true
});

const setDisableBlur = config.addBinding(PARAMS, "disableBlur");
setDisableBlur.on("change", function (ev) {
  document.body.style.setProperty("--active-blur", ev.value === true ? 0 : 1);
});

const setDisableGlare = config.addBinding(PARAMS, "disableGlare");
setDisableGlare.on("change", function (ev) {
  document.body.style.setProperty("--active-glare", ev.value === true ? 0 : 1);
});

const setInvertRotation = config.addBinding(PARAMS, "invertRotation");
setInvertRotation.on("change", function (ev) {
  invertRotation = ev.value;
});

const setRotationFactor = config.addBinding(PARAMS, "rotationFactor", {
  min: 5,
  max: 50,
  step: 5
});
setRotationFactor.on("change", function (ev) {
  rotationFactor = ev.value;
});

// --------- MOUSE TRACKING AND CARD EFFECTS LOGIC ----------------

// Distance from which the gradient starts being noticeable on the card
const gradientRange = 300;
// Reduce the actual distance to avoid the gradient to disappear abruptly
document.documentElement.style.setProperty(
  "--gradient-range",
  gradientRange - 50
);

/**
 * There are 2 effects happening on the card at the same time:
 *
 * 1. Card glare and shine effects are activated at certain moment when the cursor aproximates to the card
 * 2. Card 3D scale and rotation occurs when the mouse hovers over the card
 *
 * First effect needs to be handled on a parent component, to track the mouse outside the cards, while rotation effect can be handled as part of an event listener on the actual cards.
 */
const cards = document.querySelectorAll(".card");

document.body.addEventListener("mousemove", (e) => {
  cards.forEach((card) => {
    const rect = card.getBoundingClientRect();

    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    // Detect if mouse is near the card
    const distanceX = Math.max(
      0,
      Math.abs(e.clientX - rect.left - centerX) - centerX
    );
    const distanceY = Math.max(
      0,
      Math.abs(e.clientY - rect.top - centerY) - centerY
    );
    const distance = Math.sqrt(distanceX ** 2 + distanceY ** 2);

    if (distance < gradientRange) {
      // Proximity percentage (%)
      const proximity = 0.5 - distance / gradientRange;

      // Activate gradient and opacity for this card
      card.style.setProperty("--gradient-opacity", proximity.toFixed(2));
      card.style.setProperty("--mouse-x", `${(mouseX / rect.width) * 100}%`);
      card.style.setProperty("--mouse-y", `${(mouseY / rect.height) * 100}%`);
    } else {
      // If distance is bigger than the gradientRange, turn off the gradient
      card.style.setProperty("--gradient-opacity", "0");
    }
  });
});

// Logic for card rotation
cards.forEach((card) => {
  card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();

    const cardCenterX = rect.width / 2;
    const cardCenterY = rect.height / 2;

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let rotateX = (y - cardCenterY) / rotationFactor;
    let rotateY = (cardCenterX - x) / rotationFactor;

    if (invertRotation === true) {
      rotateX = (cardCenterY - y) / rotationFactor;
      rotateY = (x - cardCenterX) / rotationFactor;
    }

    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.2, 1.2, 1.2)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform =
      "perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)";
  });
});
</script>
