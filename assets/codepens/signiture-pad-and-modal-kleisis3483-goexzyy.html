<div class="container">
  <button id="sign_open" class="btn btn-blue">Sign Pad</button>
  <div class="sign-container">

        <h6>Sign Pad</h6>
      </div>
      <div class="content">
        <canvas id="signature-pad" class="signature-pad"></canvas>
      </div>
      <div class="footer">
        <button id="save" class="btn btn-small btn-blue">저장</button>
        <button id="erase" class="btn btn-small btn-action">지우기</button>
        <button id="close" class="btn btn-small btn-red">닫기</button>
      </div>
    </div>
  </div>
  <input type="text" id="sign" value="">
  <img id="signature1" src=""/> 
  
</div>
<script>
$(document).ready(function(){

  function initSignPad(canvasId){
   var canvas = document.getElementById(canvasId);
   var signaturePad = new SignaturePad(canvas, {
   backgroundColor: '#C6E2FF'});
    return new geniegoSignaturePad(canvas,signaturePad);
  }
  
  var signPad; 
  $('#sign_open').on('click',function(){
    $('.sign-container').css('display','flex');
    signPad = initSignPad('signature-pad');
  });  
  $('#close').on('click',function(){
    $('.sign-container').css('display','none');
  });
  
  $('#save').on('click',function(){
     if (signPad.isEmpty()) {
      return alert("서명을 해주세요.");
    }   
    signPad.save(function(file){
      $('#signature1').attr('src',file);
      $('#sign').val(file);
    });
    $('.sign-container').css('display','none');
  });
  $('#erase').on('click',function(){
    signPad.clear();
  });
});

class geniegoSignaturePad{
  //signature_pad.js필요 //https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.0.7/signature_pad.umd.min.js
  canvas;
  signpad;
  constructor(canvas , signpad){
    this.canvas = canvas;
    this.signpad = signpad;
    var ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
    signpad.clear();
  };
  
  save(callback){
    var data = this.signpad.toDataURL('image/png');
    callback(data);
  };
  
  clear(){
    this.signpad.clear();
  };
  
  isEmpty(){
    return this.signpad.isEmpty();
  };
}
</script>
