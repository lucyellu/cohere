<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator using JavaScript</title>
  <meta name="generator" content="CodePen Library Saver">
  <meta name="codepen:source" content="https://codepen.io/Max_Programming/pen/eYRPbZm">
  <style>
    html, body {
      min-height: 100%;
    }
  </style>
  <style>
  * {
  	margin: 0;
  	padding: 0;
  	box-sizing: border-box;
  }

  body {
  	width: 80%;
  	height: 100vh;
  	margin: auto;
  	display: grid;
  	place-items: center;
  }

  h1 {
  	font-family: sans-serif;
  }

  input {
  	padding: 10px;
  	border-radius: 20px;
  	border: 2px solid steelblue;
  	font-size: 1.5rem;
  	letter-spacing: 2px;
  	outline: none;
  }
  </style>
</head>
<body>
<h1>QR Code Generator</h1>
<input type="text" spellcheck="false" id="text" value="https://google.com" />
<div id="qrcode"></div>
<script>
const qrcode = document.getElementById("qrcode");
const textInput = document.getElementById("text");

const qr = new QRCode(qrcode);

textInput.oninput = (e) => {
	qr.makeCode(e.target.value.trim());
};

qr.makeCode(textInput.value.trim());
</script>
</body>
</html>
