# Netlify build for Cohear's web app (Vite SPA).
# The web app is static; the gateway (Express, holds the secret partner keys)
# must run somewhere reachable — see DEPLOY.md.

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Set VITE_GOOGLE_MAPS_KEY (and optionally VITE_SUPABASE_URL /
  # VITE_SUPABASE_ANON_KEY) in Netlify → Site settings → Environment variables.
  # Vite inlines VITE_-prefixed vars at build time.

# Proxy API calls to the gateway so the browser stays same-origin.
# CURRENT: a temporary Cloudflare quick tunnel to the gateway running on Lucy's
# machine — only live while that machine + tunnel are up, and the URL changes on
# restart. For a permanent host, deploy via render.yaml and swap the line below.
[[redirects]]
  from = "/api/*"
  to = "https://shaved-withdrawal-merchandise-toolbox.trycloudflare.com/api/:splat"
  status = 200
  force = true

# SPA fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
